<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- interactive-widget=resizes-content makes the layout viewport (and thus dvh) shrink
			 when the soft keyboard opens, so the chat composer stays visible instead of hiding
			 behind it. Native gets the same effect via windowSoftInputMode=adjustResize. -->
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, interactive-widget=resizes-content"
		/>
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#020617" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="Cordn" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="apple-touch-icon" href="/pwa/apple-touch-icon.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
